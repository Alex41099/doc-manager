<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS DocManager Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-wrapper">
    <header class="topbar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <h1>EDM System</h1>
        </div>
        <div class="header-actions">
            <button id="themeToggle" class="btn-icon">🌙</button>
            <button id="exportDb" class="btn-outline">📥 Экспорт БД</button>
        </div>
    </header>

    <main class="dashboard">
        <!-- Зона загрузки -->
        <section class="upload-section" id="dropZone">
            <div class="drop-content">
                <span class="drop-icon">📁</span>
                <h3>Перетащите документы сюда</h3>
                <p>или</p>
                <input type="file" id="fileInput" hidden multiple>
                <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
                    Выберите файлы
                </button>
            </div>
        </section>

        <!-- Панель управления -->
        <section class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по метаданным...">
            </div>
            <div class="filters">
                <select id="categoryFilter">
                    <option value="all">Все категории</option>
                    <option value="pdf">PDF Документы</option>
                    <option value="doc">Word / Текст</option>
                    <option value="image">Изображения</option>
                    <option value="other">Прочее</option>
                </select>
                <select id="sortFilter">
                    <option value="newest">Сначала новые</option>
                    <option value="oldest">Сначала старые</option>
                    <option value="sizeAsc">Размер: по возрастанию</option>
                    <option value="sizeDesc">Размер: по убыванию</option>
                </select>
            </div>
        </section>

        <!-- Таблица -->
        <section class="data-grid">
            <div class="grid-header">
                <h3>Реестр документов</h3>
                <span id="statsBadge" class="badge">0 файлов</span>
            </div>
            <div class="table-responsive">
                <table class="doc-table">
                    <thead>
                    <tr>
                        <th>Имя файла</th>
                        <th>Категория</th>
                        <th>Размер</th>
                        <th>Дата транзакции</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody id="docList">
                    <!-- JS рендер -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<!-- Контейнер для уведомлений -->
<div id="toastContainer" class="toast-container"></div>

<script src="script.js"></script>
</body>
</html>
